<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Look at the end</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            background-color: #000000;
            position: relative;
            font-family: 'Courier New', monospace;
        }

        .center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ffffff;
            font-size: clamp(30px, 8vw, 80px);
            letter-spacing: 12px;
            text-transform: uppercase;
            white-space: nowrap;
            font-weight: bold;
            animation: pulse 2.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.15; }
            50% { opacity: 1; }
            100% { opacity: 0.15; }
        }
#YOURE IN THE RIGHT TRACK
        .hint {
            position: absolute;
            bottom: 12px;
            right: 18px;
            color: #1a1a1a;
            font-size: 14px;
            font-family: 'Courier New', monospace;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="center">Look at the end</div>
    <div class="hint">RotateROT13</div>
</body>
</html>
